models:
  - name: fct_orders
    semantic_model:
      enabled: true
      name: orders
      
    agg_time_dimension: order_date
    
    columns:
      # Entities
      - name: order_id
        entity:
          type: primary
      - name: customer_id
        entity:
          name: customer
          type: foreign
      # Dimensions      
      - name: order_date
        granularity: year
        dimension:
          type: time
      - name: amount
        dimension:
          type: categorical
          
    # Newly added - Simple metrics
    metrics:
      - name: order_total
        description: The total amount for each order including taxes
        type: simple
        label: Order total
        agg: sum
        expr: total_price
      - name: order_count
        type: simple
        label: Order count
        agg: sum
        expr: 1
      - name: customers_with_orders
        description: Distinct count of customers placing orders
        type: simple
        label: Customers with orders
        agg: count_distinct
        expr: customer_id
      - name: order_value_p99
        type: simple
        label: Order value P99
        agg: percentile
        expr: total_price
        percentile: 99.0
        percentile_type: discrete

saved_queries:
  - name: test_saved_query
    description: Query for semantic model
    label: Test saved query
    config:
      tags: 'my_tag'
      cache:
        enabled: true | false
    query_params:
      metrics:
        - order_total
      group_by:
        - "Dimension('order_id__order_date')"
      where:
        - "{{ Dimension('order_id__order_date', 'DAY') }} <= now()"
        - "{{ Dimension('order_id__order_date', 'DAY') }} >= '2023-01-01'"
    exports:
      - name: my_export
        config:
          export_as: table 
          alias: my_export_alias
          schema: my_export_schema_name